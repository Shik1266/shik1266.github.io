<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>초코땡 Calendar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen">
  <div class="w-full max-w-md bg-white min-h-screen sm:min-h-[850px] sm:my-8 sm:rounded-[2.5rem] sm:shadow-2xl flex flex-col overflow-hidden relative">
    
    <header class="pt-8 pb-4 px-5 flex items-center justify-between border-b border-slate-100">
      <h1 class="text-2xl font-extrabold text-slate-900">초코땡</h1>
      <div id="status-indicator" class="w-2 h-2 rounded-full bg-slate-300"></div>
    </header>

    <section class="flex-grow flex flex-col bg-white">
      <div class="flex justify-between items-center px-5 py-4">
        <h2 id="current-month-display" class="text-lg font-bold">...</h2>
      </div>
      <div class="flex-grow overflow-y-auto no-scrollbar bg-slate-100 relative">
        <div id="calendar-grid" class="grid grid-cols-7 gap-px"></div>
      </div>
    </section>

    <section class="h-40 border-t border-slate-100 px-5 pt-4 overflow-y-auto no-scrollbar">
      <div id="schedule-list" class="space-y-2">
        <p class="text-slate-400 text-sm text-center pt-10">데이터를 불러오는 중...</p>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyBnjCWfcbvrvadmQ3bjoRJTD-rXSKzp_Bo",
      projectId: "git-io-33713",
      appId: "1:488733080531:web:2a95f7c25856b078ce8d26"
    };

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'choco-calendar';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allSchedules = [];
    let currentDate = new Date();

    renderCalendar();

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            await signInAnonymously(auth);
        } else {
            document.getElementById('status-indicator').classList.replace('bg-slate-300', 'bg-green-500');
            const schedulesCol = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');
            onSnapshot(schedulesCol, (snapshot) => {
                allSchedules = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCalendar();
            });
        }
    });

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('current-month-display').innerText = `${year}. ${(month + 1).toString().padStart(2, '0')}`;
      
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';
      // (기존 달력 렌더링 로직 위치)
    }
  </script>
</body>
</html>
