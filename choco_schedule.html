<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>초코땡 Calendar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .active-scale:active { transform: scale(0.95); }
    .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
    @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  </style>
</head>
<body class="flex justify-center items-start min-h-screen">
  <div class="w-full max-w-md bg-white min-h-screen sm:my-8 sm:rounded-[2.5rem] sm:shadow-2xl sm:border border-slate-200 relative flex flex-col overflow-hidden">
    <header class="pt-8 pb-4 px-5 flex items-center justify-between border-b border-slate-100">
      <h1 class="text-2xl font-extrabold text-slate-900">초코땡</h1>
      <i class="fa-solid fa-heart text-rose-400 text-xl"></i>
    </header>

    <section class="flex-grow flex flex-col bg-white">
      <div class="flex justify-between items-center px-5 py-4">
        <h2 id="current-month-display" class="text-lg font-bold text-slate-800"></h2>
        <div class="flex space-x-2">
          <button onclick="window.changeMonth(-1)" class="w-8 h-8 rounded-full bg-slate-50 border flex items-center justify-center hover:bg-slate-100 transition-colors"><i class="fa-solid fa-chevron-left text-[10px]"></i></button>
          <button onclick="window.changeMonth(1)" class="w-8 h-8 rounded-full bg-slate-50 border flex items-center justify-center hover:bg-slate-100 transition-colors"><i class="fa-solid fa-chevron-right text-[10px]"></i></button>
        </div>
      </div>
      <div class="grid grid-cols-7 text-center text-[11px] font-semibold text-slate-400 border-b border-slate-100 pb-2">
        <div class="text-rose-400">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-indigo-400">Sat</div>
      </div>
      <div id="calendar-grid" class="grid grid-cols-7 gap-px bg-slate-100"></div>
    </section>

    <section class="bg-white border-t border-slate-100 h-64 flex flex-col">
      <div class="px-5 py-3 border-b border-slate-50">
        <h3 id="list-title" class="text-sm font-bold text-slate-800">이번 달 일정</h3>
      </div>
      <div class="px-5 py-3 overflow-y-auto no-scrollbar flex-grow" id="schedule-list"></div>
    </section>

    <button onclick="window.openAddModal()" class="absolute bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg shadow-indigo-200 flex items-center justify-center active-scale transition-transform text-xl">
      <i class="fa-solid fa-plus"></i>
    </button>
  </div>

  <div id="schedule-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="window.closeAddModal()"></div>
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 relative z-10 modal-enter border shadow-xl">
      <h3 id="modal-title" class="text-lg font-bold mb-4 text-slate-800">일정 추가</h3>
      <input type="hidden" id="edit-id">
      
      <div class="space-y-4 mb-6">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">내용</label>
          <input type="text" id="input-title" placeholder="일정 내용을 입력하세요" class="w-full bg-slate-50 rounded-xl px-4 py-3 border outline-none focus:border-indigo-400 focus:bg-white transition-colors text-sm">
        </div>
        
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">날짜</label>
            <input type="date" id="input-date" class="w-full bg-slate-50 rounded-xl px-3 py-3 border outline-none focus:border-indigo-400 focus:bg-white transition-colors text-sm text-slate-700">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">시간</label>
            <input type="time" id="input-time" class="w-full bg-slate-50 rounded-xl px-3 py-3 border outline-none focus:border-indigo-400 focus:bg-white transition-colors text-sm text-slate-700">
          </div>
        </div>
      </div>

      <div class="flex gap-2">
        <button onclick="window.closeAddModal()" class="flex-1 py-3 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm font-bold transition-colors">취소</button>
        <button onclick="window.saveSchedule()" id="btn-save" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl text-sm font-bold shadow-md shadow-indigo-200 transition-colors">저장</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = 'choco-calendar';
    const app = initializeApp(JSON.parse('{"apiKey": "AIzaSyBnjCWfcbvrvadmQ3bjoRJTD-rXSKzp_Bo", "authDomain": "git-io-33713.firebaseapp.com", "projectId": "git-io-33713", "storageBucket": "git-io-33713.firebasestorage.app", "messagingSenderId": "488733080531", "appId": "1:488733080531:web:2a95f7c25856b078ce8d26"}'));
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allSchedules = [], currentDate = new Date();
    signInAnonymously(auth);
    onAuthStateChanged(auth, (user) => { if(user) setupListener(); });

    function setupListener() {
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'schedules'), (snap) => {
        allSchedules = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
      }, (error) => {
        console.error("Error fetching schedules: ", error);
      });
    }

    function render() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const monthStr = `${year}-${(month + 1).toString().padStart(2, '0')}`;
      
      document.getElementById('current-month-display').innerText = `${year}.${(month + 1).toString().padStart(2, '0')}`;
      document.getElementById('list-title').innerText = `${month+1}월 일정`;
      
      const grid = document.getElementById('calendar-grid'); 
      grid.innerHTML = '';
      const first = new Date(year, month, 1).getDay();
      const last = new Date(year, month + 1, 0).getDate();
      
      // 빈 칸 (이전 달력 공간)
      for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
      
      // 날짜 채우기
      for(let d=1; d<=last; d++) {
        const dateStr = `${year}-${(month+1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
        const cell = document.createElement('div');
        cell.className = "h-[85px] p-1 bg-white hover:bg-slate-50 cursor-pointer border-b border-r border-slate-100 text-[10px] overflow-hidden flex flex-col gap-0.5";
        
        // 날짜 숫자
        let dateHTML = `<div class="font-semibold text-slate-700 mb-1 pl-0.5">${d}</div>`;
        
        // 일정 배지
        const daySchedules = allSchedules.filter(s => s.date === dateStr);
        const badgesHTML = daySchedules.map(s => 
          `<div class="truncate bg-indigo-50 text-indigo-700 border border-indigo-100 rounded px-1 py-0.5">${s.title}</div>`
        ).join('');
        
        cell.innerHTML = dateHTML + badgesHTML;
        
        // 빈 공간 클릭 시 해당 날짜로 모달 열기
        cell.onclick = (e) => {
          if(e.target === cell || e.target.parentElement === cell) {
            window.openAddModal(dateStr);
          }
        };
        
        grid.appendChild(cell);
      }
      
      // 하단 목록 업데이트
      const list = document.getElementById('schedule-list'); 
      list.innerHTML = '';
      
      const filtered = allSchedules.filter(s => s.date && s.date.startsWith(monthStr))
        .sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

      if(filtered.length === 0) {
        list.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-400 mt-4"><i class="fa-regular fa-calendar-xmark text-3xl mb-2 text-slate-300"></i><p class="text-sm">등록된 일정이 없습니다.</p></div>`;
      } else {
        filtered.forEach(s => {
          const div = document.createElement('div');
          div.className = "flex justify-between items-center bg-slate-50 hover:bg-slate-100 transition-colors p-3 mb-2 rounded-xl border border-slate-100 group";
          
          const day = s.date.split('-')[2];
          div.innerHTML = `
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-sm">
                ${parseInt(day)}일
              </div>
              <div>
                <p class="font-bold text-sm text-slate-800">${s.title}</p>
                <p class="text-xs text-slate-500 font-medium">${s.time || '시간 미지정'}</p>
              </div>
            </div>
            <div class="flex gap-2 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
              <button onclick="window.editSchedule('${s.id}')" class="w-8 h-8 rounded-full bg-white border border-slate-200 text-slate-500 hover:text-indigo-600 hover:border-indigo-200 flex items-center justify-center transition-colors"><i class="fa-solid fa-pen text-[10px]"></i></button>
              <button onclick="window.deleteSchedule('${s.id}')" class="w-8 h-8 rounded-full bg-white border border-slate-200 text-slate-500 hover:text-rose-500 hover:border-rose-200 flex items-center justify-center transition-colors"><i class="fa-solid fa-trash text-[10px]"></i></button>
            </div>
          `;
          list.appendChild(div);
        });
      }
    }

    window.changeMonth = (o) => { currentDate.setMonth(currentDate.getMonth() + o); render(); };
    
    // 모달 열 때 입력값 초기화 및 특정 날짜 기본 선택 기능 추가
    window.openAddModal = (defaultDate = '') => {
      document.getElementById('modal-title').innerText = "일정 추가";
      document.getElementById('edit-id').value = "";
      document.getElementById('input-title').value = "";
      
      // 날짜 기본값 설정 (클릭한 날짜 또는 오늘)
      if (defaultDate) {
        document.getElementById('input-date').value = defaultDate;
      } else {
        const tzoffset = (new Date()).getTimezoneOffset() * 60000; 
        const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
        document.getElementById('input-date').value = localISOTime;
      }
      
      document.getElementById('input-time').value = "";
      document.getElementById('schedule-modal').classList.remove('hidden');
    };

    window.editSchedule = (id) => {
      const s = allSchedules.find(x => x.id === id);
      if (!s) return;
      document.getElementById('modal-title').innerText = "일정 수정";
      document.getElementById('edit-id').value = id;
      document.getElementById('input-title').value = s.title || '';
      document.getElementById('input-date').value = s.date || '';
      document.getElementById('input-time').value = s.time || '';
      document.getElementById('schedule-modal').classList.remove('hidden');
    };

    window.closeAddModal = () => document.getElementById('schedule-modal').classList.add('hidden');

    window.saveSchedule = async () => {
      const title = document.getElementById('input-title').value.trim();
      const date = document.getElementById('input-date').value;
      const time = document.getElementById('input-time').value;

      if (!title || !date) {
        alert("내용과 날짜를 입력해주세요."); // 알림 대신 UI에 경고 메시지를 띄우는 것이 더 좋습니다.
        return;
      }

      const id = document.getElementById('edit-id').value;
      const data = { title, date, time };
      
      if(id) {
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', id), data);
      } else {
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'schedules'), data);
      }
      window.closeAddModal();
    };

    window.deleteSchedule = async (id) => { 
      // iFrame 환경을 위해 confirm을 사용하고 있으나, 추후 커스텀 모달로 변경 권장
      if(confirm("이 일정을 삭제하시겠습니까?")) {
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', id)); 
      }
    };
  </script>
</body>
</html>
