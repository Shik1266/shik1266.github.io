<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>초코땡 Calendar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .active-scale:active { transform: scale(0.95); }
    .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
    @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  </style>
</head>
<body class="flex justify-center items-start min-h-screen">
  <div class="w-full max-w-md bg-white min-h-screen sm:my-8 sm:rounded-[2.5rem] sm:shadow-2xl sm:border border-slate-200 relative flex flex-col overflow-hidden">
    <header class="pt-8 pb-4 px-5 flex items-center justify-between border-b border-slate-100">
      <h1 class="text-2xl font-extrabold text-slate-900">초코땡</h1>
      <i class="fa-solid fa-heart text-rose-400"></i>
    </header>

    <section class="flex-grow flex flex-col bg-white">
      <div class="flex justify-between items-center px-5 py-4">
        <h2 id="current-month-display" class="text-lg font-bold text-slate-800"></h2>
        <div class="flex space-x-2">
          <button onclick="window.changeMonth(-1)" class="w-8 h-8 rounded-full bg-slate-50 border flex items-center justify-center hover:bg-slate-100"><i class="fa-solid fa-chevron-left text-[10px]"></i></button>
          <button onclick="window.changeMonth(1)" class="w-8 h-8 rounded-full bg-slate-50 border flex items-center justify-center hover:bg-slate-100"><i class="fa-solid fa-chevron-right text-[10px]"></i></button>
        </div>
      </div>
      <div class="grid grid-cols-7 text-center text-[11px] font-semibold text-slate-400 border-b border-slate-100 pb-2">
        <div class="text-rose-400">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-indigo-400">Sat</div>
      </div>
      <div id="calendar-grid" class="grid grid-cols-7 gap-px bg-slate-100"></div>
    </section>

    <section class="bg-white border-t border-slate-100 h-60 flex flex-col">
      <div class="px-5 py-3 border-b border-slate-50">
        <h3 id="list-title" class="text-sm font-bold text-slate-800">이번 달 일정</h3>
      </div>
      <div class="px-5 py-2 overflow-y-auto no-scrollbar flex-grow" id="schedule-list"></div>
    </section>

    <button onclick="window.openAddModal()" class="absolute bottom-5 right-5 w-12 h-12 bg-indigo-600 text-white rounded-full shadow-lg flex items-center justify-center active-scale">
      <i class="fa-solid fa-plus"></i>
    </button>
  </div>

  <div id="schedule-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="window.closeAddModal()"></div>
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 relative z-10 modal-enter border">
      <h3 id="modal-title" class="text-lg font-bold mb-4">일정 추가</h3>
      <input type="hidden" id="edit-id">
      <input type="text" id="input-title" placeholder="내용" class="w-full bg-slate-50 rounded-xl px-4 py-3 mb-3 border outline-none">
      <div class="grid grid-cols-2 gap-3 mb-5">
        <input type="date" id="input-date" class="bg-slate-50 rounded-xl px-3 py-2 border">
        <input type="time" id="input-time" class="bg-slate-50 rounded-xl px-3 py-2 border">
      </div>
      <div class="flex gap-2">
        <button onclick="window.closeAddModal()" class="flex-1 py-3 rounded-xl border text-sm font-bold">취소</button>
        <button onclick="window.saveSchedule()" id="btn-save" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl text-sm font-bold">저장</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = 'choco-calendar';
    const app = initializeApp(JSON.parse('{"apiKey": "AIzaSyBnjCWfcbvrvadmQ3bjoRJTD-rXSKzp_Bo", "authDomain": "git-io-33713.firebaseapp.com", "projectId": "git-io-33713", "storageBucket": "git-io-33713.firebasestorage.app", "messagingSenderId": "488733080531", "appId": "1:488733080531:web:2a95f7c25856b078ce8d26"}'));
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allSchedules = [], currentDate = new Date(), selectedDateString = null;
    signInAnonymously(auth);
    onAuthStateChanged(auth, (user) => { if(user) setupListener(); });

    function setupListener() {
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'schedules'), (snap) => {
        allSchedules = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
      });
    }

    function render() {
      const year = currentDate.getFullYear(), month = currentDate.getMonth();
      document.getElementById('current-month-display').innerText = `${year}.${(month + 1).toString().padStart(2, '0')}`;
      document.getElementById('list-title').innerText = `${month+1}월 일정`;
      
      const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
      const first = new Date(year, month, 1).getDay(), last = new Date(year, month + 1, 0).getDate();
      for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
      for(let d=1; d<=last; d++) {
        const dateStr = `${year}-${(month+1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
        const cell = document.createElement('div');
        cell.className = "h-20 p-1 bg-white hover:bg-slate-50 cursor-pointer border";
        cell.innerHTML = `<div class="text-xs">${d}</div>` + allSchedules.filter(s => s.date === dateStr).map(s => `<div class="text-[9px] truncate bg-indigo-100">${s.title}</div>`).join('');
        cell.onclick = () => { selectedDateString = dateStr; render(); };
        grid.appendChild(cell);
      }
      
      const list = document.getElementById('schedule-list'); list.innerHTML = '';
      allSchedules.filter(s => s.date.startsWith(`${year}-${(month+1).toString().padStart(2, '0')}`))
        .sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time))
        .forEach(s => {
          const div = document.createElement('div');
          div.className = "flex justify-between items-center bg-slate-50 p-2 mb-2 rounded-lg text-xs";
          div.innerHTML = `<span>${s.date.split('-')[2]}일 ${s.time} ${s.title}</span> <div><button onclick="window.editSchedule('${s.id}')" class="text-blue-500 mr-2">수정</button><button onclick="window.deleteSchedule('${s.id}')" class="text-red-500">삭제</button></div>`;
          list.appendChild(div);
        });
    }

    window.changeMonth = (o) => { currentDate.setMonth(currentDate.getMonth() + o); render(); };
    window.openAddModal = () => {
      document.getElementById('modal-title').innerText = "일정 추가";
      document.getElementById('edit-id').value = "";
      document.getElementById('schedule-modal').classList.remove('hidden');
    };
    window.editSchedule = (id) => {
      const s = allSchedules.find(x => x.id === id);
      document.getElementById('modal-title').innerText = "일정 수정";
      document.getElementById('edit-id').value = id;
      document.getElementById('input-title').value = s.title;
      document.getElementById('input-date').value = s.date;
      document.getElementById('input-time').value = s.time;
      document.getElementById('schedule-modal').classList.remove('hidden');
    };
    window.closeAddModal = () => document.getElementById('schedule-modal').classList.add('hidden');
    window.saveSchedule = async () => {
      const id = document.getElementById('edit-id').value;
      const data = { title: document.getElementById('input-title').value, date: document.getElementById('input-date').value, time: document.getElementById('input-time').value };
      if(id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', id), data);
      else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'schedules'), data);
      window.closeAddModal();
    };
    window.deleteSchedule = async (id) => { if(confirm("삭제?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', id)); };
  </script>
</body>
</html>
